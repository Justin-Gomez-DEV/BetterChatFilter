name: BetterChatFilter
version: '1.2.1'

main: dev.gomez.java.betterChatFilter.BetterChatFilter
api-version: '1.21'
load: POSTWORLD
commands:
  bcf:
    description: "Main command for BetterChatFilter"
    usage: "/bcf help"

permissions:
  betterchatfilter.reload:
    description: "This gives access to /bcf reload"
    default: op
  betterchatfilter.update.notify:
    description: "This gives an plugin update notification"
    default: op
  betterchatfilter.chatclear:
    description: "Allows for user to clear chat"
    default: op
  betterchatfilter.chatclear.bypass:
    description: "Allows user to bypass chat clear"
    default: op